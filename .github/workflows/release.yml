name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3 or v1.0.0-beta.1)'
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+'

permissions:
  contents: write

jobs:
  # -------------------------------------------------
  # Windows - Launch4j wraps JAR into a GUI .exe
  # headerType=gui compiles as /SUBSYSTEM:WINDOWS so
  # no console window appears on launch.
  # Requires Java 11+ installed on the end user's machine.
  # -------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Install Launch4j via Chocolatey
        shell: pwsh
        run: |
          choco install launch4j --version 3.50 -y --no-progress
          $launch4jc = Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "launch4jc.exe" -ErrorAction SilentlyContinue |
                       Select-Object -First 1 -ExpandProperty FullName
          if (-not $launch4jc) {
            Write-Error "launch4jc.exe not found after choco install"
            exit 1
          }
          echo "LAUNCH4JC=$launch4jc" >> $env:GITHUB_ENV
          Write-Host "launch4jc: $launch4jc"

      - name: Locate JAR and prepare output directory
        shell: pwsh
        run: |
          $jarFile = Get-ChildItem target\SwissKit-*.jar -ErrorAction Stop | Select-Object -First 1
          if ($null -eq $jarFile) { Write-Error "No SwissKit-*.jar found in target/"; exit 1 }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $jarPath = $jarFile.FullName -replace '\\', '/'
          $outPath = ((Get-Location).Path -replace '\\', '/') + "/release/SwissKit.exe"
          Write-Host "JAR : $jarPath"
          Write-Host "EXE : $outPath"
          "JAR_PATH=$jarPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EXE_PATH=$outPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write Launch4j config
        shell: pwsh
        run: |
          $lines = @(
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<launch4jConfig>',
            '  <headerType>gui</headerType>',
            "  <jar>$env:JAR_PATH</jar>",
            "  <outfile>$env:EXE_PATH</outfile>",
            '  <errTitle>SwissKit Error</errTitle>',
            '  <chdir>.</chdir>',
            '  <priority>normal</priority>',
            '  <downloadUrl>https://adoptium.net/</downloadUrl>',
            '  <supportUrl>https://github.com/MuskStark/SwissKitJ</supportUrl>',
            '  <stayAlive>false</stayAlive>',
            '  <restartOnCrash>false</restartOnCrash>',
            '  <jre>',
            '    <minVersion>11</minVersion>',
            '    <jdkPreference>preferJre</jdkPreference>',
            '    <runtimeBits>64/32</runtimeBits>',
            '  </jre>',
            '</launch4jConfig>'
          )
          $lines | Set-Content -Path launch4j-config.xml -Encoding UTF8
          Write-Host "launch4j-config.xml written:"
          Get-Content launch4j-config.xml

      - name: Build EXE with Launch4j
        shell: pwsh
        run: |
          & $env:LAUNCH4JC (Resolve-Path launch4j-config.xml).Path
          if ($LASTEXITCODE -ne 0) { Write-Error "Launch4j exited with code $LASTEXITCODE"; exit 1 }
          if (-not (Test-Path release\SwissKit.exe)) { Write-Error "SwissKit.exe was not created"; exit 1 }
          Write-Host "SwissKit.exe ready ($((Get-Item release\SwissKit.exe).Length) bytes)"

      - name: Assemble and compress Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release\SwissKit | Out-Null
          Move-Item release\SwissKit.exe release\SwissKit\SwissKit.exe
          Copy-Item README.md release\SwissKit\
          Compress-Archive -Path release\SwissKit -DestinationPath release\SwissKit-windows.zip -Force
          Write-Host "Created: release\SwissKit-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: swisskit-windows
          path: release/SwissKit-windows.zip
          retention-days: 30

  # -------------------------------------------------
  # Linux - plain JAR + shell launcher script
  # No bundled JRE; requires Java 11+ on the target machine.
  # -------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Assemble Linux package
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "SwissKit-*.jar" -type f | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No SwissKit-*.jar found in target/" >&2
            exit 1
          fi
          mkdir -p release/SwissKit
          cp "$JAR_FILE" release/SwissKit/SwissKit.jar
          cp README.md   release/SwissKit/

      # Write launcher with printf in a separate step to avoid any
      # heredoc / YAML block-mapping conflict.
      # 'exec' replaces the shell process with java for a cleaner process tree.
      - name: Write Linux launcher script
        run: |
          printf '%s\n' \
            '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            'cd "$SCRIPT_DIR"' \
            'exec java -jar SwissKit.jar "$@"' \
            > release/SwissKit/run.sh
          chmod +x release/SwissKit/run.sh

      - name: Compress Linux package
        run: |
          cd release
          zip -r SwissKit-linux.zip SwissKit
          echo "Created: release/SwissKit-linux.zip"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: swisskit-linux
          path: release/SwissKit-linux.zip
          retention-days: 30

  # -------------------------------------------------
  # macOS Apple Silicon - hand-crafted .app bundle
  #
  # Why not jpackage?
  #   jpackage app-image always embeds the build-time JRE (~200 MB)
  #   even without --runtime-image. A hand-crafted bundle is lightweight
  #   and truly JRE-free.
  #
  # Bundle layout:
  #   SwissKit.app/
  #     Contents/
  #       Info.plist        - identifies this as a GUI app to macOS
  #       MacOS/
  #         SwissKit        - executable shell script (entry point)
  #       Resources/
  #         SwissKit.jar    - application JAR
  #
  # Java resolution order in launcher:
  #   1. $JAVA_HOME/bin/java
  #   2. java found on PATH
  #   3. Newest JVM under /Library/Java/JavaVirtualMachines/
  #   If none found, shows a native alert dialog then exits.
  # -------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Derive a clean semver string (e.g. "1.2.3") from the git tag.
      - name: Resolve version for Info.plist
        id: app_version
        run: |
          RAW="${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}"
          VERSION=$(echo "$RAW" | sed 's/^v//' | sed 's/-.*//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: ${VERSION}"

      - name: Create .app bundle skeleton
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "SwissKit-*.jar" -type f | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No SwissKit-*.jar found in target/" >&2
            exit 1
          fi
          mkdir -p release/SwissKit.app/Contents/MacOS
          mkdir -p release/SwissKit.app/Contents/Resources
          cp "$JAR_FILE" release/SwissKit.app/Contents/Resources/SwissKit.jar

      # Write launcher with printf in a separate step to avoid any
      # heredoc / YAML block-mapping conflict.
      - name: Write macOS launcher script
        run: |
          printf '%s\n' \
            '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'RESOURCES_DIR="$SCRIPT_DIR/../Resources"' \
            '' \
            '# Resolve java: prefer JAVA_HOME, then PATH,' \
            '# then newest JVM under the standard macOS install location.' \
            'JAVA_BIN=""' \
            'if [ -n "$JAVA_HOME" ] && [ -x "$JAVA_HOME/bin/java" ]; then' \
            '  JAVA_BIN="$JAVA_HOME/bin/java"' \
            'elif command -v java &>/dev/null; then' \
            '  JAVA_BIN="$(command -v java)"' \
            'elif [ -d "/Library/Java/JavaVirtualMachines" ]; then' \
            '  JVM_HOME=$(ls /Library/Java/JavaVirtualMachines/ 2>/dev/null | sort -r | head -1)' \
            '  CANDIDATE="/Library/Java/JavaVirtualMachines/${JVM_HOME}/Contents/Home/bin/java"' \
            '  if [ -x "$CANDIDATE" ]; then' \
            '    JAVA_BIN="$CANDIDATE"' \
            '  fi' \
            'fi' \
            '' \
            'if [ -z "$JAVA_BIN" ]; then' \
            '  osascript -e "display alert \"Java Not Found\" message \"SwissKit requires Java 11 or later.\n\nDownload from https://adoptium.net/\" as critical"' \
            '  exit 1' \
            'fi' \
            '' \
            'exec "$JAVA_BIN" -jar "$RESOURCES_DIR/SwissKit.jar" "$@"' \
            > release/SwissKit.app/Contents/MacOS/SwissKit
          chmod +x release/SwissKit.app/Contents/MacOS/SwissKit

      # Write Info.plist line-by-line with printf.
      # APP_VERSION is assigned from a GitHub Actions output before the
      # shell runs, so ${{ }} and shell variables do not conflict.
      - name: Write Info.plist
        run: |
          APP_VERSION="${{ steps.app_version.outputs.version }}"
          INFO="release/SwissKit.app/Contents/Info.plist"
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'                                 > "$INFO"
          printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"'                  >> "$INFO"
          printf '%s\n' '  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'                   >> "$INFO"
          printf '%s\n' '<plist version="1.0">'                                                  >> "$INFO"
          printf '%s\n' '<dict>'                                                                  >> "$INFO"
          printf '%s\n' '  <key>CFBundleName</key>'                                              >> "$INFO"
          printf '%s\n' '  <string>SwissKit</string>'                                            >> "$INFO"
          printf '%s\n' '  <key>CFBundleDisplayName</key>'                                       >> "$INFO"
          printf '%s\n' '  <string>SwissKit</string>'                                            >> "$INFO"
          printf '%s\n' '  <key>CFBundleIdentifier</key>'                                        >> "$INFO"
          printf '%s\n' '  <string>com.muskstark.swisskit</string>'                              >> "$INFO"
          printf '%s\n' '  <key>CFBundleVersion</key>'                                           >> "$INFO"
          printf '%s'   '  <string>'                                                              >> "$INFO"
          printf '%s\n' "$APP_VERSION"'</string>'                                                 >> "$INFO"
          printf '%s\n' '  <key>CFBundleShortVersionString</key>'                                >> "$INFO"
          printf '%s'   '  <string>'                                                              >> "$INFO"
          printf '%s\n' "$APP_VERSION"'</string>'                                                 >> "$INFO"
          printf '%s\n' '  <key>CFBundlePackageType</key>'                                       >> "$INFO"
          printf '%s\n' '  <string>APPL</string>'                                                >> "$INFO"
          printf '%s\n' '  <key>CFBundleExecutable</key>'                                        >> "$INFO"
          printf '%s\n' '  <string>SwissKit</string>'                                            >> "$INFO"
          printf '%s\n' '  <key>LSMinimumSystemVersion</key>'                                    >> "$INFO"
          printf '%s\n' '  <string>10.13</string>'                                               >> "$INFO"
          printf '%s\n' '  <key>NSHighResolutionCapable</key>'                                   >> "$INFO"
          printf '%s\n' '  <true/>'                                                              >> "$INFO"
          printf '%s\n' '  <key>LSUIElement</key>'                                               >> "$INFO"
          printf '%s\n' '  <false/>'                                                             >> "$INFO"
          printf '%s\n' '</dict>'                                                                 >> "$INFO"
          printf '%s\n' '</plist>'                                                                >> "$INFO"
          echo "--- Info.plist ---"
          cat "$INFO"

      - name: Verify and compress .app bundle
        run: |
          echo "--- Bundle structure ---"
          find release/SwissKit.app -type f | sort
          cd release
          # -y preserves symbolic links inside .app (required for a valid bundle)
          zip -ry SwissKit-macos-apple-silicon.zip SwissKit.app
          echo "Created: release/SwissKit-macos-apple-silicon.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: swisskit-macos
          path: release/SwissKit-macos-apple-silicon.zip
          retention-days: 30

  # -------------------------------------------------
  # Create GitHub Release
  # Runs only after all three platform builds succeed.
  # -------------------------------------------------
  create-release:
    needs: [ build-windows, build-linux, build-macos ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh artifacts/

      - name: Resolve version string
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Determine pre-release status
        id: prerelease
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [[ "$VERSION" == *"-alpha."* || "$VERSION" == *"-beta."* || "$VERSION" == *"-rc."* ]]; then
            echo "is_prerelease=true"   >> "$GITHUB_OUTPUT"
            echo "label= (Pre-release)" >> "$GITHUB_OUTPUT"
            echo "warning=> ⚠️ This is a pre-release version. Use with caution and please report any bugs!" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false"  >> "$GITHUB_OUTPUT"
            echo "label="               >> "$GITHUB_OUTPUT"
            echo "warning="             >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SwissKit ${{ steps.get_version.outputs.version }}${{ steps.prerelease.outputs.label }}
          body: |
            ## SwissKit ${{ steps.get_version.outputs.version }}${{ steps.prerelease.outputs.label }}

            ${{ steps.prerelease.outputs.warning }}

            ### Requirements
            Java 11 or later must be installed on your system.

            | Platform | Install |
            |---|---|
            | Windows | [Download from Adoptium](https://adoptium.net/) |
            | macOS | `brew install --cask temurin@11` |
            | Linux (Debian/Ubuntu) | `sudo apt install openjdk-11-jre` |
            | Linux (Fedora/RHEL) | `sudo dnf install java-11-openjdk` |

            ### Downloads

            | Platform | File | How to run |
            |---|---|---|
            | Windows 10/11 (64-bit) | `SwissKit-windows.zip` | Extract then double-click `SwissKit.exe` |
            | Linux x64 | `SwissKit-linux.zip` | Extract then run `./run.sh` |
            | macOS Apple Silicon (M1/M2/M3) | `SwissKit-macos-apple-silicon.zip` | Extract then double-click `SwissKit.app` |

            ### What's New
            See the [CHANGELOG](https://github.com/MuskStark/SwissKitJ/blob/main/CHANGELOG.md) for details.

            ---
            SHA-256 checksums are provided in `checksums.txt`.
            This release was automatically created by GitHub Actions.
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}