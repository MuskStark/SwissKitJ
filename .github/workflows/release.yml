name: Release

on:
  push:
    tags:
      # Stable releases: v1.0.0, v1.2.3
      - 'v[0-9]+\.[0-9]+\.[0-9]'
      # Pre-release: v1.0.0-alpha.1, v1.0.0-beta.1, v1.0.0-rc.1
      - 'v[0-9]+\.[0-9]+\.[0-9]-alpha\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]-beta\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]-rc\.[0-9]+'

permissions:
  contents: write

jobs:
  # Windows EXE + bundled JRE
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Download JRE 11
        shell: pwsh
        run: |
          # Download Adoptium JRE (portable, no installer)
          $jreUrl = "https://github.com/adoptium/temurin11-jre/releases/download/jdk-11.0.25%2B9/OpenJDK11U-jre_x64_windows_hotspot_11.0.25_9.zip"
          Invoke-WebRequest -Uri $jreUrl -OutFile jre.zip -UseBasicParsing
          Expand-Archive -Path jre.zip -DestinationPath jre -Force
          
          # Rename jre folder
          Get-ChildItem -Path jre -Directory | Select-Object -First 1 | Rename-Item -NewName "jre"

      - name: Create Windows package with bundled JRE
        shell: pwsh
        run: |
          $jarFile = Get-ChildItem target/SwissKit-*.jar | Select-Object -First 1
          if ($null -eq $jarFile) {
            Write-Error "JAR file not found"
            exit 1
          }
          
          # Create output directory
          New-Item -ItemType Directory -Force -Path release/windows | Out-Null
          
          # ===== Create package with bundled JRE =====
          # Directory structure:
          # SwissKit/
          # ├── jre/
          # │   └── bin/java.exe
          # ├── SwissKit.jar
          # └── run.bat
          New-Item -ItemType Directory -Force -Path release/windows/SwissKit/jre | Out-Null
          Copy-Item -Path jre/* -Destination release/windows/SwissKit/jre/ -Recurse -Force
          Copy-Item $jarFile.FullName release/windows/SwissKit/SwissKit.jar
          
          # Create run.bat
          "@echo off" | Out-File -FilePath release/windows/SwissKit/run.bat -Encoding ASCII
          "cd /d %%~dp0" | Out-File -FilePath release/windows/SwissKit/run.bat -Append -Encoding ASCII
          "start jre\\bin\\javaw -jar SwissKit.jar" | Out-File -FilePath release/windows/SwissKit/run.bat -Append -Encoding ASCII
          
          # Create run.sh for reference
          "#!/bin/bash" | Out-File -FilePath release/windows/SwissKit/run.sh -Encoding ASCII
          "cd \"$(dirname "$0\")\"" | Out-File -FilePath release/windows/SwissKit/run.sh -Append -Encoding ASCII
          "./jre/bin/java -jar SwissKit.jar" | Out-File -FilePath release/windows/SwissKit/run.sh -Append -Encoding ASCII
          
          Copy-Item README.md release/windows/SwissKit/
          
          # Create ZIP (no EXE wrapper, direct bundled JRE)
          Compress-Archive -Path release/windows/SwissKit/* -DestinationPath release/SwissKit-windows.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swisskit-windows
          path: release/*.zip
          retention-days: 30

  # Linux JAR + bundled JRE
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Download JRE 11 (Linux)
        run: |
          # Download Adoptium JRE
          wget -q https://github.com/adoptium/temurin11-jre/releases/download/jdk-11.0.25%2B9/OpenJDK11U-jre_x64_linux_hotspot_11.0.25_9.tar.gz -O jre.tar.gz
          mkdir -p jre
          tar -xzf jre.tar.gz -C jre --strip-components=1

      - name: Create Linux package with bundled JRE
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "SwissKit-*.jar" -type f | head -1)
          
          # Create directory structure
          mkdir -p release/linux/SwissKit/jre/bin
          mkdir -p release/linux/SwissKit/lib
          
          # Copy JRE
          cp -r jre/* release/linux/SwissKit/jre/
          
          # Copy JAR
          cp "$JAR_FILE" release/linux/SwissKit/SwissKit.jar
          
          # Create launcher script
          run: |
            printf '#!/bin/bash\nSCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\ncd "$SCRIPT_DIR"\n./jre/bin/java -jar SwissKit.jar "$@"\n' > release/linux/SwissKit/run.sh
            chmod +x release/linux/SwissKit/run.sh
          
          cp README.md release/linux/SwissKit/
          
          # Create ZIP
          cd release/linux
          zip -r ../SwissKit-linux.zip SwissKit/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swisskit-linux
          path: release/*.zip
          retention-days: 30

  # macOS JAR + bundled JRE (Intel + ARM64)
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: x64
            jre-arch: x64
          - os: macos-latest
            arch: arm64
            jre-arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Download JRE 11 (macOS ${{ matrix.arch }})
        run: |
          # Download Adoptium JRE for ${{ matrix.jre-arch }}
          if [ "${{ matrix.jre-arch }}" = "x64" ]; then
            JRE_URL="https://github.com/adoptium/temurin11-jre/releases/download/jdk-11.0.25%2B9/OpenJDK11U-jre_x64_mac_hotspot_11.0.25_9.tar.gz"
          else
            JRE_URL="https://github.com/adoptium/temurin11-jre/releases/download/jdk-11.0.25%2B9/OpenJDK11U-jre_aarch64_mac_hotspot_11.0.25_9.tar.gz"
          fi
          wget -q "$JRE_URL" -O jre.tar.gz
          mkdir -p jre
          tar -xzf jre.tar.gz -C jre --strip-components=1

      - name: Create macOS package with bundled JRE
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "SwissKit-*.jar" -type f | head -1)
          
          # Create directory structure
          mkdir -p release/macos/SwissKit/Contents/Home/jre/bin
          
          # Copy JRE (with macOS special structure for JRE)
          cp -r jre/* release/macos/SwissKit/Contents/Home/jre/
          
          # Copy JAR
          cp "$JAR_FILE" release/macos/SwissKit/
          
          # Create launcher script (for command line use)
          run: |
            printf '#!/bin/bash\nSCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\ncd "$SCRIPT_DIR"\n./Contents/Home/jre/bin/java -jar SwissKit.jar "$@"\n' > release/macos/SwissKit/run.sh
            chmod +x release/macos/SwissKit/run.sh
          
          cp README.md release/macos/SwissKit/
          
          # Determine filename suffix
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            SUFFIX="-apple-silicon"
          else
            SUFFIX="-intel"
          fi
          
          # Create ZIP
          cd release/macos
          zip -r ../SwissKit-macos${SUFFIX}.zip SwissKit/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swisskit-macos-${{ matrix.arch }}
          path: release/*.zip
          retention-days: 30

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version from tag
        id: get_version
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check if pre-release
        id: prerelease
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          if [[ "$version" == *"-alpha."* ]] || [[ "$version" == *"-beta."* ]] || [[ "$version" == *"-rc."* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        run: |
          {
            echo "### SHA-256 Checksums"
            echo ""
            echo "`...`"
            find artifacts -type f -name "*.zip" -exec sh -c 'printf "%s:" "$1"; sha256sum -- "$1" | cut -d" " -f1' _ {} \;
            echo "`...`"
          } > artifacts/checksums.txt

      - name: List artifacts
        run: |
          ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SwissKit ${{ steps.get_version.outputs.version }}${{ steps.prerelease.outputs.is_prerelease == 'true' && ' (Pre-release)' || '' }}
          body: |
            ## SwissKit ${{ steps.get_version.outputs.version }}${{ steps.prerelease.outputs.is_prerelease == 'true' && ' (Pre-release)' || '' }}

            ### ⚠️ Pre-release Warning
            ${{ steps.prerelease.outputs.is_prerelease == 'true' && 'This is a pre-release version. Use with caution and report any bugs you find!' || '' }}

            ### 🎉 No Java Required!
            All packages include bundled JRE - just download, extract, and run!

            ### Installation Options

            #### Windows
            - Download: `SwissKit-windows.zip`
            - Extract and double-click `run.bat` to start
            - **No Java installation required**

            #### Linux
            - Download: `SwissKit-linux.zip`
            - Extract and run: `./run.sh`
            - **No Java installation required**

            #### macOS (Intel)
            - Download: `SwissKit-macos-intel.zip`
            - Extract and run: `./run.sh`
            - **No Java installation required**

            #### macOS (Apple Silicon - M1/M2/M3)
            - Download: `SwissKit-macos-apple-silicon.zip`
            - Extract and run: `./run.sh`
            - **No Java installation required**

            ### What's New
            - See the [CHANGELOG](https://github.com/MuskStark/SwissKitJ/blob/main/CHANGELOG.md) for details.

            ### System Requirements
            - **Windows**: Windows 10/11 (64-bit)
            - **Linux**: Ubuntu 20.04+ or similar Linux (64-bit)
            - **macOS**: macOS 10.13+ (Intel or Apple Silicon)

            ### Documentation
            - [README](https://github.com/MuskStark/SwissKitJ#readme)
            - [AGENTS.md](https://github.com/MuskStark/SwissKitJ/blob/main/AGENTS.md) (Technical Documentation)

            ---

            **Note**: This release was automatically created by GitHub Actions.

            **Checksums**:
            See the `checksums.txt` file for SHA-256 checksums of all artifacts.
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}