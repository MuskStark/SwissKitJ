<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Minecraft Crafting Table - Accurate Pixel Art -->

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" fill="#1a1a2e"/>

  <!-- === TOP FACE (Crafting Grid) === -->
  <rect x="24" y="24" width="208" height="208" fill="#C4A676"/>

  <!-- Top face wood grain highlights -->
  <rect x="24" y="24" width="208" height="8" fill="#D4B686"/>
  <rect x="24" y="32" width="8" height="200" fill="#D4B686"/>

  <!-- 3x3 Crafting Grid Background -->
  <rect x="40" y="40" width="176" height="176" fill="#6B4423"/>

  <!-- Grid Cells (darker wood inside) -->
  <!-- Row 1 -->
  <rect x="44" y="44" width="52" height="52" fill="#8B5A2B"/>
  <rect x="100" y="44" width="52" height="52" fill="#8B5A2B"/>
  <rect x="156" y="44" width="52" height="52" fill="#8B5A2B"/>

  <!-- Row 2 -->
  <rect x="44" y="100" width="52" height="52" fill="#8B5A2B"/>
  <rect x="100" y="100" width="52" height="52" fill="#8B5A2B"/>
  <rect x="156" y="100" width="52" height="52" fill="#8B5A2B"/>

  <!-- Row 3 -->
  <rect x="44" y="156" width="52" height="52" fill="#8B5A2B"/>
  <rect x="100" y="156" width="52" height="52" fill="#8B5A2B"/>
  <rect x="156" y="156" width="52" height="52" fill="#8B5A2B"/>

  <!-- Grid Numbers (pixel style) -->
  <!-- Number 1 - cell 1 -->
  <rect x="62" y="56" width="8" height="28" fill="#FFFFFF"/>

  <!-- Number 2 - cell 2 -->
  <rect x="118" y="56" width="20" height="4" fill="#FFFFFF"/>
  <rect x="118" y="60" width="4" height="12" fill="#FFFFFF"/>
  <rect x="118" y="68" width="16" height="4" fill="#FFFFFF"/>
  <rect x="130" y="72" width="4" height="12" fill="#FFFFFF"/>
  <rect x="126" y="80" width="20" height="4" fill="#FFFFFF"/>

  <!-- Number 3 - cell 3 -->
  <rect x="174" y="56" width="20" height="4" fill="#FFFFFF"/>
  <rect x="174" y="60" width="4" height="12" fill="#FFFFFF"/>
  <rect x="174" y="68" width="16" height="4" fill="#FFFFFF"/>
  <rect x="186" y="72" width="4" height="12" fill="#FFFFFF"/>
  <rect x="174" y="80" width="20" height="4" fill="#FFFFFF"/>

  <!-- Number 4 - cell 4 -->
  <rect x="62" y="112" width="16" height="4" fill="#FFFFFF"/>
  <rect x="62" y="116" width="4" height="20" fill="#FFFFFF"/>
  <rect x="74" y="116" width="12" height="12" fill="#FFFFFF"/>
  <rect x="86" y="112" width="4" height="32" fill="#FFFFFF"/>

  <!-- Number 5 - cell 5 -->
  <rect x="118" y="112" width="20" height="4" fill="#FFFFFF"/>
  <rect x="118" y="116" width="4" height="12" fill="#FFFFFF"/>
  <rect x="118" y="124" width="16" height="4" fill="#FFFFFF"/>
  <rect x="134" y="128" width="4" height="12" fill="#FFFFFF"/>
  <rect x="118" y="136" width="20" height="4" fill="#FFFFFF"/>

  <!-- Number 6 - cell 6 -->
  <rect x="174" y="112" width="20" height="4" fill="#FFFFFF"/>
  <rect x="174" y="116" width="4" height="28" fill="#FFFFFF"/>
  <rect x="174" y="136" width="16" height="4" fill="#FFFFFF"/>
  <rect x="186" y="128" width="4" height="12" fill="#FFFFFF"/>
  <rect x="174" y="140" width="20" height="4" fill="#FFFFFF"/>

  <!-- Number 7 - cell 7 -->
  <rect x="62" y="168" width="20" height="4" fill="#FFFFFF"/>
  <rect x="86" y="172" width="4" height="20" fill="#FFFFFF"/>
  <rect x="74" y="180" width="12" height="4" fill="#FFFFFF"/>
  <rect x="70" y="184" width="4" height="12" fill="#FFFFFF"/>
  <rect x="62" y="188" width="12" height="4" fill="#FFFFFF"/>

  <!-- Number 8 - cell 8 -->
  <rect x="118" y="168" width="20" height="4" fill="#FFFFFF"/>
  <rect x="118" y="172" width="4" height="12" fill="#FFFFFF"/>
  <rect x="134" y="172" width="4" height="12" fill="#FFFFFF"/>
  <rect x="118" y="180" width="16" height="4" fill="#FFFFFF"/>
  <rect x="118" y="184" width="4" height="12" fill="#FFFFFF"/>
  <rect x="134" y="184" width="4" height="12" fill="#FFFFFF"/>
  <rect x="118" y="192" width="20" height="4" fill="#FFFFFF"/>

  <!-- Number 9 - cell 9 -->
  <rect x="174" y="168" width="20" height="4" fill="#FFFFFF"/>
  <rect x="174" y="172" width="4" height="12" fill="#FFFFFF"/>
  <rect x="190" y="172" width="4" height="12" fill="#FFFFFF"/>
  <rect x="174" y="180" width="20" height="4" fill="#FFFFFF"/>
  <rect x="186" y="184" width="4" height="12" fill="#FFFFFF"/>
  <rect x="174" y="192" width="20" height="4" fill="#FFFFFF"/>

  <!-- Grid Lines -->
  <rect x="40" y="40" width="176" height="4" fill="#3D2817"/>
  <rect x="40" y="220" width="176" height="4" fill="#3D2817"/>
  <rect x="40" y="40" width="4" height="184" fill="#3D2817"/>
  <rect x="212" y="40" width="4" height="184" fill="#3D2817"/>

  <!-- Inner grid lines - vertical -->
  <rect x="98" y="40" width="4" height="180" fill="#3D2817"/>
  <rect x="154" y="40" width="4" height="180" fill="#3D2817"/>
  <!-- Inner grid lines - horizontal -->
  <rect x="40" y="98" width="176" height="4" fill="#3D2817"/>
  <rect x="40" y="154" width="176" height="4" fill="#3D2817"/>

  <!-- === FRAME / BORDER === -->
  <rect x="16" y="16" width="224" height="224" fill="none" stroke="#5C4033" stroke-width="8"/>

  <!-- === LEGS (visible at bottom corners) === -->
  <rect x="32" y="232" width="24" height="24" fill="#8B5A2B"/>
  <rect x="200" y="232" width="24" height="24" fill="#8B5A2B"/>

  <!-- Leg shading -->
  <rect x="32" y="232" width="8" height="24" fill="#6B4423"/>
  <rect x="200" y="232" width="8" height="24" fill="#6B4423"/>

  <!-- === EDGE HIGHLIGHTS === -->
  <!-- Top highlight -->
  <rect x="16" y="16" width="224" height="8" fill="#D4B686"/>
  <rect x="16" y="24" width="8" height="8" fill="#D4B686"/>

  <!-- Bottom shadow -->
  <rect x="16" y="240" width="224" height="8" fill="#3D2817"/>
  <rect x="224" y="232" width="8" height="16" fill="#3D2817"/>
</svg>
